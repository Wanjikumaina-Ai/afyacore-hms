<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AfyaCore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-app-region: drag; /* allow dragging the frameless window */
      user-select: none;
    }

    .card {
      width: 480px;
      height: 320px;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    .logo-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #003B7A, #52B854);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    h1 {
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .tagline {
      color: #64748b;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #52B854;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      color: #94a3b8;
      font-size: 12px;
      min-height: 16px;
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-ring">🏥</div>
    <div>
      <h1>AfyaCore HMS</h1>
      <p class="tagline">Health Management System</p>
    </div>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p id="status">Starting server…</p>
    </div>
  </div>
</body>
</html>
